<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的龙虾控制器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="control-panel">
    <h1>我的龙虾控制器</h1>
    <div class="status">当前状态：未操作</div>
    <div class="btn-group">
      <button id="forward">前进 🚀</button>
      <button id="backward">后退 ↩️</button>
    </div>
    <div class="btn-group">
      <button id="left">左转 ←</button>
      <button id="right">右转 →</button>
    </div>
    <div class="btn-group">
      <button id="stop">停止 ⏹️</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
